@if(post(); as post) {
  <app-avatar-circle
    class="size32"
    [avatarUrl]="post.author.avatarUrl"
  ></app-avatar-circle>
  <main class="post-body">
    <div class="post-header">
      <strong class="post__author">
        {{post.author.firstName}} {{post.author.lastName}}
        <span class="post-created-at">{{post.createdAt | date: 'dd.MM.YYYY' }}</span>
      </strong>
    </div>
    <p class="medium-text">{{ post.content }}</p>
    <div class="post-counters">
      <span class="comment-amount">
        <svg icon="comment" class="svg16"></svg>
        <span class="comments-length">{{ post.comments.length }}</span>
      </span>
    </div>

    <app-post-input
      [postId]="post.id"
      [isCommentInput]="true"
    ></app-post-input>
  </main>
}
